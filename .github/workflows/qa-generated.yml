name: qa-generated

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generated-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TEST_ENV: staging
      STAGING_BASE_URL: http://127.0.0.1:3000
      STAGING_API_URL: http://127.0.0.1:8080
      HEADLESS: true
      SLOW_MO: 0
      TIMEOUT: 30000
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install application dependencies
        working-directory: application_code
        run: npm install

      - name: Install Playwright dependencies
        working-directory: playwright_template
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: application_code
        run: |
          nohup go run main.go > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Start frontend
        working-directory: application_code
        run: |
          nohup npm run dev > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          exit 1

      - name: Run generated quality gate
        working-directory: playwright_template
        run: npm run qa:generated

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright_template/playwright-report
            playwright_template/test-results
            playwright_template/tests/api/generated.spec.ts
            playwright_template/tests/web/generated-web.spec.ts
            backend.log
            frontend.log
          if-no-files-found: warn